version: '3.8'

services:
  cache-simulator:
    build: .
    container_name: cache-simulator
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
