apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-simulator
  namespace: cache-simulator
  labels:
    app: cache-simulator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cache-simulator
  template:
    metadata:
      labels:
        app: cache-simulator
    spec:
      containers:
      - name: cache-simulator
        image: cache-simulator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
